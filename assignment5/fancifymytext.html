<!DOCTYPE html>
<html>
	<head>
		<title>Fancify Shamcify</title>

		<script src="fancifymytext.js"></script>
		
	</head>

	<body>
		<h1>Fancify my Text</h1>
		
		<fieldset>
			<legend>Text</legend>
			<textarea id="textInput" rows="4" cols="30"></textarea>
		</fieldset>

		<fieldset>
			<legend>Fancify</legend>
			<button type="button" onclick="makeTextBigger()">Bigger!</button><br><br>
			<label>
				<input type="radio" id="fancy" name="styleChoice" onchange="applyStyles()">
				FancyShmancy
			</label><br>
			<label>
				<input type="radio" id="boring" name="styleChoice" onchange="applyStyles()">
				BoringBetty
			</label><br><br>
			<button type="button" onclick="mooText()">Moo</button>
		</fieldset>
		
	</body>
</html>
